name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static web preview
        run: pnpm web:build

      - name: Rewrite asset paths for PR preview
        run: |
          node -e "const fs=require('fs');const file='dist/index.html';const base='/cloud/pr-${{ github.event.pull_request.number }}/';let html=fs.readFileSync(file,'utf8');html=html.replace(/(href|src)=\\\"\\//g,(_,attr)=>attr+'=\\\"'+base);fs.writeFileSync(file,html);"

      - name: Deploy preview to gh-pages/pr-${{ github.event.pull_request.number }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const url = `https://${owner}.github.io/${repo}/pr-${prNumber}/?v=${context.sha}`;
            const marker = '<!-- pr-preview-url -->';
            const body = `${marker}\nH5 预览地址：${url}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((c) => typeof c.body === 'string' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }

      # 在 PR 每次同步并成功部署预览后发送邮件（便于在轮换预览访问用 Secrets 后仍能收到「预览已更新」提醒）。
      # GitHub 不会在「仅修改仓库 Secret」时触发 workflow，因此以预览部署成功为触发点。
      # 启用方式：仓库 Settings → Secrets and variables → Actions → Variables 新增 PR_PREVIEW_EMAIL_NOTIFY=true；
      # Secrets：PR_PREVIEW_SMTP_CONNECTION_URL（如 smtp+starttls://user:pass@smtp.example.com:587）、
      # PR_PREVIEW_NOTIFY_EMAIL（收件人）、PR_PREVIEW_MAIL_FROM（发件人显示名，需符合 SMTP 要求）。
      - name: Send preview update email
        if: ${{ vars.PR_PREVIEW_EMAIL_NOTIFY == 'true' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: dawidd6/action-send-mail@v3
        with:
          connection_url: ${{ secrets.PR_PREVIEW_SMTP_CONNECTION_URL }}
          subject: "[PR 预览] #${{ github.event.pull_request.number }} 已更新 — ${{ github.event.pull_request.title }}"
          to: ${{ secrets.PR_PREVIEW_NOTIFY_EMAIL }}
          from: ${{ secrets.PR_PREVIEW_MAIL_FROM }}
          html_body: |
            <p>PR H5 预览已成功重新部署。</p>
            <ul>
              <li>PR：<a href="${{ github.event.pull_request.html_url }}">#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}</a></li>
              <li>分支：<code>${{ github.head_ref }}</code></li>
              <li>提交：<code>${{ github.sha }}</code></li>
              <li>触发者：@${{ github.actor }}</li>
              <li>预览地址：<a href="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/?v=${{ github.sha }}">打开 H5 预览</a></li>
            </ul>
            <p>若你刚在仓库里更新了预览相关 Secrets（访问口令等），本次部署已使用最新配置；请用邮件中的链接验收。</p>
